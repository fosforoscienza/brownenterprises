<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Project Manager · Brown Enterprises</title>
<link rel="icon" href="wp-content/uploads/2025/07/cropped-logo-brown-enterpises_sito-09-1-32x32.png" sizes="32x32">
<style>
  /* --- reset & base ----------------------------------------------------- */
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;overflow:hidden}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Inter",Roboto,sans-serif;
    background:#1d2125;
    color:#b6c2cf;
    font-size:14px;
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer}
  ::selection{background:rgba(87,157,255,0.4);color:#fff}

  /* --- layout ----------------------------------------------------------- */
  .app{
    display:grid;
    grid-template-rows:44px 1fr;
    grid-template-columns:260px 1fr;
    grid-template-areas:"topbar topbar" "sidebar board";
    height:100vh;
  }

  /* --- top bar ---------------------------------------------------------- */
  .topbar{
    grid-area:topbar;
    background:#1d2125;
    border-bottom:1px solid #2c3338;
    display:flex;
    align-items:center;
    padding:0 16px;
    gap:14px;
    z-index:20;
  }
  .topbar-logo{
    display:flex;
    align-items:center;
    gap:10px;
    color:#f4f5f7;
    font-weight:700;
    font-size:14px;
    letter-spacing:0.2px;
  }
  .topbar-logo img{height:24px;filter:invert(1) brightness(2)}
  .topbar-spacer{flex:1}
  .topbar-user{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .topbar-user .avatar{
    width:28px;height:28px;border-radius:50%;
    background:linear-gradient(135deg,#579dff,#9f8fef);
    color:#1d2125;
    font-weight:700;font-size:12px;
    display:flex;align-items:center;justify-content:center;
  }
  .icon-btn{
    background:transparent;border:0;color:#9fadbc;
    width:32px;height:32px;border-radius:4px;
    display:inline-flex;align-items:center;justify-content:center;
    transition:background 0.15s,color 0.15s;
  }
  .icon-btn:hover{background:#2c3338;color:#f4f5f7}

  /* --- sidebar ---------------------------------------------------------- */
  .sidebar{
    grid-area:sidebar;
    background:#1d2125;
    border-right:1px solid #2c3338;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  .sidebar-header{
    padding:14px 14px 8px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .sidebar-title{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.8px;
    color:#9fadbc;
    font-weight:700;
  }
  .sidebar-add{
    background:transparent;border:0;color:#9fadbc;
    width:24px;height:24px;border-radius:4px;
    display:inline-flex;align-items:center;justify-content:center;
    transition:background 0.15s,color 0.15s;
  }
  .sidebar-add:hover{background:#2c3338;color:#f4f5f7}
  .projects{
    flex:1;
    overflow-y:auto;
    padding:4px 8px 12px;
  }
  .project-item{
    display:flex;
    align-items:center;
    gap:8px;
    padding:6px 8px;
    border-radius:4px;
    cursor:pointer;
    color:#b6c2cf;
    transition:background 0.12s,color 0.12s;
    margin-bottom:2px;
    user-select:none;
    position:relative;
  }
  .project-item:hover{background:#2c3338}
  .project-item.active{
    background:#1c2b41;
    color:#cce0ff;
  }
  .project-item.active .project-icon{background:#579dff;color:#1d2125}
  .project-icon{
    width:22px;height:22px;border-radius:4px;
    background:linear-gradient(135deg,#4bce97,#579dff);
    color:#1d2125;
    font-size:11px;font-weight:700;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .project-name{
    flex:1;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    font-size:14px;
  }
  .project-delete{
    opacity:0;
    background:transparent;border:0;color:#9fadbc;
    width:22px;height:22px;border-radius:4px;
    display:inline-flex;align-items:center;justify-content:center;
    transition:opacity 0.12s,background 0.12s,color 0.12s;
  }
  .project-item:hover .project-delete{opacity:1}
  .project-delete:hover{background:#412a2a;color:#f87168}
  .empty-projects{
    text-align:center;
    color:#738496;
    font-size:12px;
    padding:24px 12px;
    line-height:1.5;
  }
  .sidebar-footer{
    padding:10px 14px;
    border-top:1px solid #2c3338;
    font-size:11px;
    color:#738496;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .logout-btn{
    background:transparent;border:0;color:#9fadbc;
    font-size:12px;
    display:inline-flex;align-items:center;gap:4px;
    padding:4px 8px;border-radius:4px;
    transition:background 0.12s,color 0.12s;
  }
  .logout-btn:hover{background:#2c3338;color:#f4f5f7}

  /* --- board ------------------------------------------------------------ */
  .board{
    grid-area:board;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    background:#1d2125;
    background-image:linear-gradient(180deg,rgba(87,157,255,0.05),transparent 280px);
  }
  .board-header{
    padding:14px 24px;
    display:flex;
    align-items:center;
    gap:12px;
    flex-shrink:0;
  }
  .board-title{
    font-size:18px;
    font-weight:700;
    color:#f4f5f7;
    background:transparent;
    border:1px solid transparent;
    border-radius:4px;
    padding:4px 8px;
    margin:0;
    outline:none;
    min-width:120px;
    max-width:600px;
  }
  .board-title:hover{background:rgba(255,255,255,0.04)}
  .board-title:focus{background:#22272b;border-color:#579dff}
  .board-meta{
    color:#8c9bab;
    font-size:12px;
  }
  .board-content{
    flex:1;
    overflow-x:auto;
    overflow-y:hidden;
    padding:0 24px 24px;
    display:flex;
    align-items:flex-start;
    gap:12px;
    scrollbar-width:thin;
    scrollbar-color:#38414b transparent;
  }
  .board-content::-webkit-scrollbar{height:12px}
  .board-content::-webkit-scrollbar-track{background:transparent}
  .board-content::-webkit-scrollbar-thumb{background:#38414b;border-radius:6px;border:3px solid #1d2125}

  /* --- columns ---------------------------------------------------------- */
  .column{
    background:#101204;
    border-radius:10px;
    width:280px;
    flex-shrink:0;
    max-height:100%;
    display:flex;
    flex-direction:column;
    box-shadow:0 1px 0 rgba(255,255,255,0.04);
  }
  .column.drag-over{
    background:#161a1d;
    outline:2px dashed #579dff;
    outline-offset:-2px;
  }
  .column-header{
    padding:10px 12px 6px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-shrink:0;
  }
  .column-title{
    font-size:13px;
    font-weight:700;
    color:#f4f5f7;
    display:flex;align-items:center;gap:8px;
  }
  .column-count{
    background:#22272b;
    color:#9fadbc;
    font-size:11px;
    font-weight:600;
    padding:1px 7px;
    border-radius:10px;
  }
  .cards{
    flex:1;
    overflow-y:auto;
    padding:0 8px;
    scrollbar-width:thin;
    scrollbar-color:#38414b transparent;
    min-height:8px;
  }
  .cards::-webkit-scrollbar{width:8px}
  .cards::-webkit-scrollbar-track{background:transparent}
  .cards::-webkit-scrollbar-thumb{background:#38414b;border-radius:4px}

  /* --- card ------------------------------------------------------------- */
  .card{
    background:#22272b;
    border-radius:8px;
    padding:8px 12px;
    margin-bottom:8px;
    cursor:grab;
    transition:background 0.12s,box-shadow 0.12s,transform 0.12s;
    border:1px solid transparent;
    box-shadow:0 1px 0 rgba(0,0,0,0.25);
    position:relative;
    user-select:none;
  }
  .card:hover{
    background:#2c3338;
    border-color:#38414b;
  }
  .card.dragging{
    opacity:0.4;
    cursor:grabbing;
    transform:rotate(1.5deg);
  }
  .card-priority{
    display:inline-block;
    height:6px;
    width:42px;
    border-radius:3px;
    margin-bottom:6px;
  }
  .card-priority.red   { background:#f87168 }
  .card-priority.yellow{ background:#f5cd47 }
  .card-priority.green { background:#4bce97 }
  .card-title{
    color:#f4f5f7;
    font-size:14px;
    line-height:1.35;
    word-wrap:break-word;
    white-space:pre-wrap;
  }
  .card-actions{
    position:absolute;
    top:6px;
    right:6px;
    opacity:0;
    transition:opacity 0.12s;
  }
  .card:hover .card-actions{opacity:1}
  .card-action{
    background:rgba(0,0,0,0.4);
    border:0;color:#9fadbc;
    width:22px;height:22px;border-radius:4px;
    display:inline-flex;align-items:center;justify-content:center;
    margin-left:2px;
    transition:background 0.12s,color 0.12s;
  }
  .card-action:hover{background:#412a2a;color:#f87168}

  /* --- add card --------------------------------------------------------- */
  .add-card{
    margin:4px 8px 8px;
    padding:8px 12px;
    color:#9fadbc;
    background:transparent;
    border:0;
    border-radius:6px;
    font-size:14px;
    text-align:left;
    display:flex;
    align-items:center;
    gap:6px;
    transition:background 0.12s,color 0.12s;
  }
  .add-card:hover{
    background:rgba(255,255,255,0.06);
    color:#f4f5f7;
  }
  .add-card-form{
    margin:4px 8px 8px;
    background:transparent;
  }
  .add-card-form textarea{
    width:100%;
    background:#22272b;
    border:1px solid #579dff;
    color:#f4f5f7;
    border-radius:8px;
    padding:8px 12px;
    font-family:inherit;
    font-size:14px;
    resize:vertical;
    min-height:60px;
    outline:none;
    box-shadow:0 1px 0 rgba(0,0,0,0.25);
  }
  .add-card-form .priority-row{
    display:flex;
    gap:6px;
    margin-top:8px;
    align-items:center;
  }
  .priority-row .label{font-size:11px;color:#9fadbc;text-transform:uppercase;letter-spacing:0.5px;font-weight:700;margin-right:2px}
  .priority-pill{
    background:transparent;
    border:1px solid #38414b;
    border-radius:999px;
    padding:3px 10px;
    font-size:11px;
    color:#b6c2cf;
    display:inline-flex;align-items:center;gap:5px;
    transition:background 0.12s,border-color 0.12s;
  }
  .priority-pill:hover{background:#2c3338}
  .priority-pill.active{border-color:#579dff;background:#1c2b41}
  .priority-pill .dot{
    width:8px;height:8px;border-radius:50%;
  }
  .priority-pill .dot.red{background:#f87168}
  .priority-pill .dot.yellow{background:#f5cd47}
  .priority-pill .dot.green{background:#4bce97}
  .add-card-form .actions{
    display:flex;
    gap:6px;
    margin-top:8px;
    align-items:center;
  }
  .btn-primary{
    background:#579dff;
    color:#1d2125;
    border:0;
    padding:7px 14px;
    border-radius:4px;
    font-weight:700;
    font-size:13px;
    transition:background 0.12s;
  }
  .btn-primary:hover{background:#85b8ff}
  .btn-cancel{
    background:transparent;
    border:0;
    color:#9fadbc;
    padding:6px 8px;
    border-radius:4px;
    font-size:13px;
  }
  .btn-cancel:hover{background:#2c3338;color:#f4f5f7}

  /* --- empty state ------------------------------------------------------ */
  .empty-board{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    color:#738496;
    text-align:center;
    padding:40px;
  }
  .empty-board h2{
    color:#b6c2cf;
    font-size:18px;
    margin:0 0 8px;
  }
  .empty-board p{margin:0 0 16px;font-size:14px}
  .empty-board .btn-primary{padding:9px 18px;font-size:14px}

  /* --- modal ------------------------------------------------------------ */
  .modal-backdrop{
    position:fixed;inset:0;
    background:rgba(0,0,0,0.6);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:100;
    backdrop-filter:blur(2px);
  }
  .modal{
    background:#22272b;
    border:1px solid #38414b;
    border-radius:10px;
    padding:24px;
    width:100%;
    max-width:420px;
    box-shadow:0 24px 60px rgba(0,0,0,0.6);
  }
  .modal h2{
    margin:0 0 16px;
    color:#f4f5f7;
    font-size:16px;
    font-weight:700;
  }
  .modal label{
    display:block;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.5px;
    color:#9fadbc;
    font-weight:700;
    margin-bottom:6px;
  }
  .modal textarea,.modal input[type=text]{
    width:100%;
    background:#1d2125;
    border:1px solid #38414b;
    color:#f4f5f7;
    border-radius:6px;
    padding:9px 11px;
    font-family:inherit;
    font-size:14px;
    outline:none;
    margin-bottom:14px;
  }
  .modal textarea{resize:vertical;min-height:80px}
  .modal textarea:focus,.modal input[type=text]:focus{border-color:#579dff}
  .modal .actions{
    display:flex;
    justify-content:flex-end;
    gap:8px;
    margin-top:8px;
  }

  /* --- topbar button (calendar) ----------------------------------------- */
  .topbar-btn{
    background:transparent;border:1px solid #38414b;color:#b6c2cf;
    padding:6px 12px;border-radius:6px;
    display:inline-flex;align-items:center;gap:6px;
    font-size:13px;font-weight:600;
    transition:background 0.12s,color 0.12s,border-color 0.12s;
  }
  .topbar-btn:hover{background:#2c3338;color:#f4f5f7;border-color:#579dff}
  .topbar-btn svg{flex-shrink:0}

  /* --- calendar overlay ------------------------------------------------- */
  .cal-overlay{
    position:fixed;inset:0;
    background:#1d2125;
    z-index:50;
    display:flex;flex-direction:column;
    visibility:hidden;
    opacity:0;
    transition:opacity 0.18s;
  }
  .cal-overlay.show{visibility:visible;opacity:1}

  .cal-header{
    padding:12px 20px;
    border-bottom:1px solid #2c3338;
    display:flex;
    align-items:center;
    gap:14px;
    flex-wrap:wrap;
  }
  .cal-title{
    font-size:18px;font-weight:700;color:#f4f5f7;
    display:flex;align-items:center;gap:10px;
    margin:0;
  }
  .cal-title svg{color:#579dff}
  .cal-spacer{flex:1}
  .cal-nav{
    display:flex;align-items:center;gap:2px;
  }
  .cal-nav-btn{
    background:#22272b;border:1px solid #38414b;color:#b6c2cf;
    width:30px;height:30px;
    border-radius:6px;
    display:inline-flex;align-items:center;justify-content:center;
    transition:background 0.12s,color 0.12s;
  }
  .cal-nav-btn:hover{background:#2c3338;color:#f4f5f7}
  .cal-today-btn{
    background:#22272b;border:1px solid #38414b;color:#b6c2cf;
    padding:6px 12px;border-radius:6px;
    font-size:12px;font-weight:600;
    transition:background 0.12s,color 0.12s;
  }
  .cal-today-btn:hover{background:#2c3338;color:#f4f5f7}
  .cal-period{
    color:#f4f5f7;font-weight:700;font-size:15px;
    min-width:200px;text-align:center;
    text-transform:capitalize;
  }
  .cal-views{
    display:inline-flex;background:#22272b;border:1px solid #38414b;border-radius:6px;padding:2px;
  }
  .cal-views button{
    background:transparent;border:0;color:#9fadbc;
    padding:6px 14px;border-radius:4px;
    font-size:12px;font-weight:600;
    transition:background 0.12s,color 0.12s;
  }
  .cal-views button.active{background:#1c2b41;color:#cce0ff}
  .cal-views button:hover:not(.active){background:#2c3338;color:#f4f5f7}
  .cal-add-btn{
    background:#579dff;color:#1d2125;
    border:0;padding:7px 14px;border-radius:6px;
    font-weight:700;font-size:13px;
    display:inline-flex;align-items:center;gap:6px;
    transition:background 0.12s;
  }
  .cal-add-btn:hover{background:#85b8ff}
  .cal-close{
    background:transparent;border:0;color:#9fadbc;
    width:32px;height:32px;border-radius:6px;
    display:inline-flex;align-items:center;justify-content:center;
    transition:background 0.12s,color 0.12s;
  }
  .cal-close:hover{background:#412a2a;color:#f87168}

  .cal-main{flex:1;display:flex;overflow:hidden}
  .cal-side{
    width:220px;flex-shrink:0;
    background:#1d2125;
    border-right:1px solid #2c3338;
    padding:12px 10px;
    overflow-y:auto;
    display:flex;flex-direction:column;
    gap:2px;
  }
  .cal-side h3{
    margin:0 0 8px;padding:0 8px;
    font-size:11px;font-weight:700;color:#9fadbc;
    text-transform:uppercase;letter-spacing:0.6px;
  }
  .cal-person-row{
    display:flex;align-items:center;gap:10px;
    padding:7px 8px;
    border-radius:6px;
    cursor:pointer;
    user-select:none;
    font-size:13px;
    color:#b6c2cf;
    transition:background 0.12s;
    --pc:#579dff;
  }
  .cal-person-row:hover{background:#2c3338}
  .cal-person-row.all{
    font-weight:700;color:#cce0ff;
    margin-bottom:4px;
  }
  .cal-cb{
    width:16px;height:16px;
    border:2px solid #38414b;
    border-radius:4px;
    flex-shrink:0;
    background:#1d2125;
    position:relative;
    transition:background 0.12s,border-color 0.12s;
  }
  .cal-person-row.checked .cal-cb{
    background:var(--pc);
    border-color:var(--pc);
  }
  .cal-person-row.checked .cal-cb::after{
    content:"";
    position:absolute;
    left:4px;top:1px;
    width:4px;height:8px;
    border:solid #1d2125;
    border-width:0 2px 2px 0;
    transform:rotate(45deg);
  }
  .cal-person-name{
    flex:1;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .cal-person-count{
    background:#22272b;
    color:#9fadbc;
    font-size:10px;font-weight:700;
    padding:1px 7px;border-radius:10px;
    flex-shrink:0;
  }
  .cal-side-divider{
    height:1px;background:#2c3338;
    margin:6px 4px;
  }
  .cal-side-actions{
    display:flex;gap:6px;margin:6px 0 4px;
  }
  .cal-side-actions button{
    flex:1;
    background:#22272b;border:1px solid #38414b;color:#9fadbc;
    padding:5px 8px;border-radius:4px;
    font-size:11px;font-weight:600;
    transition:background 0.12s,color 0.12s;
  }
  .cal-side-actions button:hover{background:#2c3338;color:#f4f5f7}

  .cal-body{flex:1;overflow:hidden;display:flex;flex-direction:column;background:#101204}

  /* Month view */
  .cal-month{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .cal-month-headrow{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    background:#1d2125;
    border-bottom:1px solid #2c3338;
  }
  .cal-month-headrow > div{
    padding:8px 12px;
    font-size:11px;text-transform:uppercase;letter-spacing:0.5px;
    font-weight:700;color:#9fadbc;
    border-right:1px solid #2c3338;
  }
  .cal-month-headrow > div:last-child{border-right:0}
  .cal-month-grid{
    flex:1;
    display:grid;
    grid-template-columns:repeat(7,1fr);
    grid-auto-rows:minmax(100px,1fr);
    overflow-y:auto;
  }
  .cal-day-cell{
    background:#1d2125;
    border-right:1px solid #2c3338;
    border-bottom:1px solid #2c3338;
    padding:6px 6px 4px;
    display:flex;flex-direction:column;
    cursor:pointer;
    transition:background 0.12s;
    overflow:hidden;
  }
  .cal-day-cell:hover{background:#22272b}
  .cal-day-cell.other-month{background:#161a1d}
  .cal-day-cell.other-month .cal-day-num{color:#5c6c7e}
  .cal-day-cell.today{background:#1c2b41}
  .cal-day-cell.today .cal-day-num{
    background:#579dff;color:#1d2125;
    border-radius:50%;width:24px;height:24px;
    display:inline-flex;align-items:center;justify-content:center;
    font-weight:700;
  }
  .cal-day-num{
    font-size:12px;font-weight:600;color:#b6c2cf;
    align-self:flex-start;
    padding:0 4px;
    margin-bottom:4px;
  }
  .cal-day-events{
    display:flex;flex-direction:column;gap:2px;
    overflow:hidden;
  }
  .cal-event{
    color:#f4f5f7;
    font-size:11px;
    padding:2px 6px;
    border-radius:3px;
    border-left:3px solid #579dff;
    background:#22272b;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    line-height:1.3;
    cursor:pointer;
  }
  .cal-event:hover{background:#2c3338}
  .cal-event-more{
    font-size:10px;color:#9fadbc;padding:1px 6px;
    cursor:pointer;
  }
  .cal-event-more:hover{color:#cce0ff}

  /* Week view */
  .cal-week{
    flex:1;
    display:grid;
    grid-template-columns:repeat(7,1fr);
    overflow:hidden;
    background:#101204;
  }
  .cal-week-col{
    background:#1d2125;
    border-right:1px solid #2c3338;
    display:flex;flex-direction:column;
    overflow:hidden;
  }
  .cal-week-col:last-child{border-right:0}
  .cal-week-head{
    padding:10px 12px;
    border-bottom:1px solid #2c3338;
    cursor:pointer;
    transition:background 0.12s;
  }
  .cal-week-head:hover{background:#22272b}
  .cal-week-head.today{background:#1c2b41}
  .cal-week-head.today .cal-week-day-num{color:#579dff}
  .cal-week-day-name{font-size:11px;color:#9fadbc;text-transform:uppercase;letter-spacing:0.5px;font-weight:700}
  .cal-week-day-num{font-size:20px;font-weight:700;color:#f4f5f7;margin-top:2px}
  .cal-week-events{
    flex:1;overflow-y:auto;
    padding:8px;
    display:flex;flex-direction:column;gap:6px;
  }

  .cal-week-event{
    background:#22272b;
    border-left:3px solid #579dff;
    padding:6px 8px;
    border-radius:4px;
    cursor:pointer;
    transition:background 0.12s;
  }
  .cal-week-event:hover{background:#2c3338}
  .cal-week-event-time{color:#9fadbc;font-size:10px;font-weight:700;margin-bottom:2px;letter-spacing:0.3px}
  .cal-week-event-title{color:#f4f5f7;font-weight:600;line-height:1.3;font-size:12px;word-wrap:break-word}
  .cal-week-event-person{color:#9fadbc;font-size:11px;margin-top:3px;display:flex;align-items:center;gap:5px}
  .cal-person-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}

  /* Day view */
  .cal-day-view{
    flex:1;
    display:flex;flex-direction:column;
    overflow:hidden;
    background:#101204;
  }
  .cal-day-view-head{
    padding:18px 24px;
    border-bottom:1px solid #2c3338;
    background:#1d2125;
    text-align:center;
  }
  .cal-day-view-head h3{
    margin:0;color:#f4f5f7;
    font-size:24px;font-weight:700;
    text-transform:capitalize;
  }
  .cal-day-view-head.today h3 span.daynum{color:#579dff}
  .cal-day-list{
    flex:1;overflow-y:auto;
    padding:18px 24px;
    display:flex;flex-direction:column;gap:8px;
    max-width:840px;margin:0 auto;
    width:100%;
  }
  .cal-day-event-card{
    background:#1d2125;
    border:1px solid #2c3338;
    border-left:4px solid #579dff;
    padding:12px 16px;
    border-radius:6px;
    cursor:pointer;
    display:flex;align-items:flex-start;gap:14px;
    transition:background 0.12s,border-color 0.12s;
  }
  .cal-day-event-card:hover{background:#22272b;border-color:#38414b}
  .cal-day-event-time{
    color:#cce0ff;font-weight:700;font-size:13px;
    min-width:90px;flex-shrink:0;
    padding-top:1px;
  }
  .cal-day-event-time.notime{color:#738496;font-style:italic;font-weight:600}
  .cal-day-event-body{flex:1;min-width:0}
  .cal-day-event-title{color:#f4f5f7;font-size:15px;font-weight:600;margin-bottom:4px;word-wrap:break-word}
  .cal-day-event-meta{color:#9fadbc;font-size:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .cal-day-event-notes{color:#9fadbc;font-size:12px;margin-top:6px;line-height:1.4;white-space:pre-wrap}

  .cal-empty{
    text-align:center;color:#738496;padding:80px 24px;font-size:14px;
  }
  .cal-empty h3{margin:0 0 8px;color:#b6c2cf;font-size:16px;font-weight:600}
  .cal-empty p{margin:0 0 18px}

  /* --- responsive ------------------------------------------------------- */
  @media (max-width:780px){
    .app{grid-template-columns:1fr;grid-template-areas:"topbar" "board";grid-template-rows:44px 1fr}
    .sidebar{display:none}
    .topbar-btn span{display:none}
    .cal-period{min-width:120px;font-size:13px}
    .cal-views button{padding:5px 10px;font-size:11px}
    .cal-week{grid-auto-flow:row;grid-template-columns:1fr}
    .cal-week-col{border-right:0;border-bottom:1px solid #2c3338}
    .cal-month-grid{grid-auto-rows:minmax(70px,1fr)}
    .cal-side{width:160px;padding:8px 6px}
    .cal-person-name{font-size:12px}
    .cal-person-count{display:none}
  }
  @media (max-width:560px){
    .cal-side{display:none}
  }
</style>
</head>
<body>

<div class="app" id="app">

<!-- Calendar overlay -->
<div class="cal-overlay" id="cal-overlay" aria-hidden="true">
  <div class="cal-header">
    <h2 class="cal-title">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>

<script>
/* =====================================================================
 * Auth gate
 * ===================================================================== */
(function authGate(){
  try{
    if(sessionStorage.getItem("brown_auth") !== "1"){
      window.location.replace("login.html");
    }
  }catch(_){
    window.location.replace("login.html");
  }
})();

/* =====================================================================
 * Storage helpers
 * ===================================================================== */
var STORAGE_KEY = "brown_pm_data_v1";
var COLUMNS = [
  { id:"todo",       title:"To Do" },
  { id:"inprogress", title:"In Progress" },
  { id:"done",       title:"Done" }
];

function uid(prefix){
  return prefix + "_" + Math.random().toString(36).slice(2,9) + Date.now().toString(36).slice(-3);
}
function loadData(){
  try{
    var raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      var parsed = JSON.parse(raw);
      if(parsed && Array.isArray(parsed.projects)) return parsed;
    }
  }catch(_){}
  return seedData();
}
function saveData(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(_){}
}
function seedData(){
  var pid = uid("p");
  return {
    version: 1,
    activeProjectId: pid,
    projects: [{
      id: pid,
      name: "Progetto di esempio",
      columns: {
        todo: [
          { id: uid("c"), title: "Brief al cliente",            priority: "red" },
          { id: uid("c"), title: "Mockup grafico homepage",     priority: "yellow" }
        ],
        inprogress: [
          { id: uid("c"), title: "Sviluppo landing page",       priority: "yellow" }
        ],
        done: [
          { id: uid("c"), title: "Riunione kickoff",            priority: "green" }
        ]
      }
    }]
  };
}

/* =====================================================================
 * State
 * ===================================================================== */
var state = loadData();

function getActiveProject(){
  return state.projects.find(function(p){ return p.id === state.activeProjectId; }) || state.projects[0] || null;
}

/* =====================================================================
 * Rendering
 * ===================================================================== */
var $projects = document.getElementById("projects");
var $board    = document.getElementById("board");

function projectInitial(name){
  return (name || "?").trim().charAt(0).toUpperCase() || "?";
}

function renderSidebar(){
  $projects.innerHTML = "";
  if(!state.projects.length){
    var empty = document.createElement("div");
    empty.className = "empty-projects";
    empty.textContent = "Nessun progetto. Aggiungine uno con +";
    $projects.appendChild(empty);
    return;
  }
  state.projects.forEach(function(proj){
    var item = document.createElement("div");
    item.className = "project-item" + (proj.id === state.activeProjectId ? " active" : "");
    item.dataset.projectId = proj.id;

    var ico = document.createElement("div");
    ico.className = "project-icon";
    ico.textContent = projectInitial(proj.name);

    var name = document.createElement("div");
    name.className = "project-name";
    name.textContent = proj.name;

    var del = document.createElement("button");
    del.className = "project-delete";
    del.title = "Elimina progetto";
    del.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg>';
    del.addEventListener("click", function(e){
      e.stopPropagation();
      deleteProject(proj.id);
    });

    item.appendChild(ico);
    item.appendChild(name);
    item.appendChild(del);
    item.addEventListener("click", function(){
      state.activeProjectId = proj.id;
      saveData();
      render();
    });

    $projects.appendChild(item);
  });
}

function renderBoard(){
  $board.innerHTML = "";

  var proj = getActiveProject();
  if(!proj){
    var empty = document.createElement("div");
    empty.className = "empty-board";
    empty.innerHTML = '<h2>Nessun progetto attivo</h2><p>Crea il tuo primo progetto per iniziare.</p>';
    var btn = document.createElement("button");
    btn.className = "btn-primary";
    btn.textContent = "+ Nuovo progetto";
    btn.addEventListener("click", promptNewProject);
    empty.appendChild(btn);
    $board.appendChild(empty);
    return;
  }

  // Header
  var header = document.createElement("div");
  header.className = "board-header";
  var title = document.createElement("input");
  title.className = "board-title";
  title.value = proj.name;
  title.spellcheck = false;
  title.addEventListener("change", function(){
    var v = title.value.trim();
    if(!v){ title.value = proj.name; return; }
    proj.name = v;
    saveData();
    renderSidebar();
  });
  title.addEventListener("keydown", function(e){
    if(e.key === "Enter"){ e.preventDefault(); title.blur(); }
  });
  var meta = document.createElement("span");
  meta.className = "board-meta";
  var totalCards = COLUMNS.reduce(function(sum,col){ return sum + (proj.columns[col.id]||[]).length; }, 0);
  meta.textContent = totalCards + " card · 3 liste";
  header.appendChild(title);
  header.appendChild(meta);
  $board.appendChild(header);

  // Columns
  var content = document.createElement("div");
  content.className = "board-content";

  COLUMNS.forEach(function(col){
    var $col = document.createElement("section");
    $col.className = "column";
    $col.dataset.columnId = col.id;

    var $head = document.createElement("div");
    $head.className = "column-header";
    var $t = document.createElement("div");
    $t.className = "column-title";
    var cnt = (proj.columns[col.id] || []).length;
    $t.innerHTML = '<span>' + col.title + '</span><span class="column-count">' + cnt + '</span>';
    $head.appendChild($t);
    $col.appendChild($head);

    var $cards = document.createElement("div");
    $cards.className = "cards";
    $cards.dataset.columnId = col.id;
    (proj.columns[col.id] || []).forEach(function(card){
      $cards.appendChild(buildCardEl(card, col.id));
    });
    $col.appendChild($cards);

    var $add = document.createElement("button");
    $add.className = "add-card";
    $add.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg> Aggiungi una carta';
    $add.addEventListener("click", function(){
      openAddCardForm($col, col.id);
    });
    $col.appendChild($add);

    // drop zone events on the whole column
    $col.addEventListener("dragover", function(e){
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      $col.classList.add("drag-over");
    });
    $col.addEventListener("dragleave", function(e){
      if(e.target === $col || !$col.contains(e.relatedTarget)){
        $col.classList.remove("drag-over");
      }
    });
    $col.addEventListener("drop", function(e){
      e.preventDefault();
      $col.classList.remove("drag-over");
      var cardId = e.dataTransfer.getData("text/card-id");
      var fromCol = e.dataTransfer.getData("text/from-col");
      if(!cardId) return;

      // figure out drop position relative to the cards in this column
      var afterEl = getDragAfterElement($cards, e.clientY);
      moveCard(cardId, fromCol, col.id, afterEl ? afterEl.dataset.cardId : null);
    });

    content.appendChild($col);
  });

  $board.appendChild(content);
}

function buildCardEl(card, columnId){
  var $card = document.createElement("article");
  $card.className = "card";
  $card.draggable = true;
  $card.dataset.cardId = card.id;
  $card.dataset.columnId = columnId;

  if(card.priority){
    var $p = document.createElement("span");
    $p.className = "card-priority " + card.priority;
    $card.appendChild($p);
  }

  var $t = document.createElement("div");
  $t.className = "card-title";
  $t.textContent = card.title;
  $card.appendChild($t);

  var $actions = document.createElement("div");
  $actions.className = "card-actions";
  var $del = document.createElement("button");
  $del.className = "card-action";
  $del.title = "Elimina";
  $del.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>';
  $del.addEventListener("click", function(e){
    e.stopPropagation();
    deleteCard(card.id, columnId);
  });
  $actions.appendChild($del);
  $card.appendChild($actions);

  // edit on click
  $card.addEventListener("click", function(e){
    if(e.target.closest(".card-action")) return;
    openEditCardModal(card.id, columnId);
  });

  // dragging
  $card.addEventListener("dragstart", function(e){
    $card.classList.add("dragging");
    e.dataTransfer.effectAllowed = "move";
    e.dataTransfer.setData("text/card-id", card.id);
    e.dataTransfer.setData("text/from-col", columnId);
  });
  $card.addEventListener("dragend", function(){
    $card.classList.remove("dragging");
    document.querySelectorAll(".column.drag-over").forEach(function(c){ c.classList.remove("drag-over"); });
  });

  return $card;
}

function getDragAfterElement(container, y){
  var els = Array.prototype.slice.call(container.querySelectorAll(".card:not(.dragging)"));
  var closest = null, closestOffset = -Infinity;
  for(var i=0;i<els.length;i++){
    var box = els[i].getBoundingClientRect();
    var offset = y - box.top - box.height / 2;
    if(offset < 0 && offset > closestOffset){
      closestOffset = offset;
      closest = els[i];
    }
  }
  return closest;
}

/* =====================================================================
 * Mutations
 * ===================================================================== */
function moveCard(cardId, fromColId, toColId, beforeCardId){
  var proj = getActiveProject(); if(!proj) return;
  var fromArr = proj.columns[fromColId];
  var idx = fromArr.findIndex(function(c){ return c.id === cardId; });
  if(idx < 0) return;
  var card = fromArr.splice(idx,1)[0];
  var toArr = proj.columns[toColId];
  if(beforeCardId){
    var bIdx = toArr.findIndex(function(c){ return c.id === beforeCardId; });
    if(bIdx >= 0){ toArr.splice(bIdx, 0, card); }
    else toArr.push(card);
  } else {
    toArr.push(card);
  }
  saveData();
  renderBoard();
}

function deleteCard(cardId, columnId){
  var proj = getActiveProject(); if(!proj) return;
  proj.columns[columnId] = proj.columns[columnId].filter(function(c){ return c.id !== cardId; });
  saveData();
  renderBoard();
}

function addCard(columnId, title, priority){
  var proj = getActiveProject(); if(!proj) return;
  proj.columns[columnId].push({ id: uid("c"), title: title.trim(), priority: priority || null });
  saveData();
  renderBoard();
}

function updateCard(cardId, columnId, title, priority){
  var proj = getActiveProject(); if(!proj) return;
  var card = proj.columns[columnId].find(function(c){ return c.id === cardId; });
  if(!card) return;
  card.title = title.trim();
  card.priority = priority || null;
  saveData();
  renderBoard();
}

function deleteProject(projectId){
  if(!confirm("Eliminare definitivamente questo progetto?")) return;
  state.projects = state.projects.filter(function(p){ return p.id !== projectId; });
  if(state.activeProjectId === projectId){
    state.activeProjectId = state.projects.length ? state.projects[0].id : null;
  }
  saveData();
  render();
}

function promptNewProject(){
  showInputModal({
    title: "Nuovo progetto",
    label: "Nome del progetto",
    placeholder: "Es. Sito istituzionale",
    confirmText: "Crea",
    onConfirm: function(name){
      var n = name.trim();
      if(!n) return;
      var p = {
        id: uid("p"),
        name: n,
        columns: { todo:[], inprogress:[], done:[] }
      };
      state.projects.push(p);
      state.activeProjectId = p.id;
      saveData();
      render();
    }
  });
}

/* =====================================================================
 * Inline add-card form
 * ===================================================================== */
function openAddCardForm($col, columnId){
  // close any other open form
  document.querySelectorAll(".add-card-form").forEach(function(f){ f.remove(); });
  document.querySelectorAll(".add-card").forEach(function(b){ b.style.display = ""; });

  var $existingBtn = $col.querySelector(".add-card");
  if($existingBtn) $existingBtn.style.display = "none";

  var form = document.createElement("div");
  form.className = "add-card-form";
  form.innerHTML =
    '<textarea placeholder="Inserisci un titolo per la carta..."></textarea>' +
    '<div class="priority-row">' +
      '<span class="label">Priorità</span>' +
      '<button class="priority-pill" data-priority="red"   ><span class="dot red"></span>Alta</button>' +
      '<button class="priority-pill" data-priority="yellow"><span class="dot yellow"></span>Media</button>' +
      '<button class="priority-pill active" data-priority="green" ><span class="dot green"></span>Bassa</button>' +
    '</div>' +
    '<div class="actions">' +
      '<button class="btn-primary">Aggiungi carta</button>' +
      '<button class="btn-cancel">Annulla</button>' +
    '</div>';
  $col.appendChild(form);

  var $ta      = form.querySelector("textarea");
  var $confirm = form.querySelector(".btn-primary");
  var $cancel  = form.querySelector(".btn-cancel");
  var $pills   = form.querySelectorAll(".priority-pill");
  var priority = "green";

  $pills.forEach(function(p){
    p.addEventListener("click", function(){
      $pills.forEach(function(x){ x.classList.remove("active"); });
      p.classList.add("active");
      priority = p.dataset.priority;
    });
  });

  function close(){
    form.remove();
    if($existingBtn) $existingBtn.style.display = "";
  }
  function commit(){
    var v = $ta.value.trim();
    if(!v){ $ta.focus(); return; }
    addCard(columnId, v, priority);
  }
  $confirm.addEventListener("click", commit);
  $cancel.addEventListener("click", close);
  $ta.addEventListener("keydown", function(e){
    if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); commit(); }
    if(e.key === "Escape"){ close(); }
  });
  $ta.focus();
}

 * Edit card modal
 * ===================================================================== */
function openEditCardModal(cardId, columnId){
  var proj = getActiveProject(); if(!proj) return;
  var card = proj.columns[columnId].find(function(c){ return c.id === cardId; });
  if(!card) return;

  var backdrop = document.createElement("div");
  backdrop.className = "modal-backdrop";
  backdrop.innerHTML =
    '<div class="modal" role="dialog">' +
      '<h2>Modifica carta</h2>' +
      '<label>Titolo</label>' +
      '<textarea id="m-title"></textarea>' +
      '<label>Priorità</label>' +
      '<div class="priority-row" style="margin-bottom:14px">' +
        '<button class="priority-pill" data-priority="red"   ><span class="dot red"></span>Alta</button>' +
        '<button class="priority-pill" data-priority="yellow"><span class="dot yellow"></span>Media</button>' +
        '<button class="priority-pill" data-priority="green" ><span class="dot green"></span>Bassa</button>' +
      '</div>' +
      '<div class="actions">' +
        '<button class="btn-cancel" id="m-cancel">Annulla</button>' +
        '<button class="btn-primary" id="m-save">Salva</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(backdrop);

  var $ta = backdrop.querySelector("#m-title");
  $ta.value = card.title;
  setTimeout(function(){ $ta.focus(); $ta.select(); }, 0);

  var priority = card.priority || "green";
  var $pills = backdrop.querySelectorAll(".priority-pill");
  $pills.forEach(function(p){
    if(p.dataset.priority === priority) p.classList.add("active");
    p.addEventListener("click", function(){
      $pills.forEach(function(x){ x.classList.remove("active"); });
      p.classList.add("active");
      priority = p.dataset.priority;
    });
  });

  function close(){ backdrop.remove(); document.removeEventListener("keydown", onKey); }
  function save(){
    var v = $ta.value.trim();
    if(!v) { $ta.focus(); return; }
    updateCard(cardId, columnId, v, priority);
    close();
  }
  function onKey(e){
    if(e.key === "Escape") close();
    if(e.key === "Enter" && (e.metaKey || e.ctrlKey)) save();
  }
  document.addEventListener("keydown", onKey);

  backdrop.addEventListener("click", function(e){ if(e.target === backdrop) close(); });
  backdrop.querySelector("#m-cancel").addEventListener("click", close);
  backdrop.querySelector("#m-save").addEventListener("click", save);
}

function showInputModal(opts){
  var backdrop = document.createElement("div");
  backdrop.className = "modal-backdrop";
  backdrop.innerHTML =
    '<div class="modal" role="dialog">' +
      '<h2></h2>' +
      '<label></label>' +
      '<input type="text" id="m-input">' +
      '<div class="actions">' +
        '<button class="btn-cancel" id="m-cancel">Annulla</button>' +
        '<button class="btn-primary" id="m-confirm"></button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(backdrop);

  backdrop.querySelector("h2").textContent = opts.title;
  backdrop.querySelector("label").textContent = opts.label;
  var $i = backdrop.querySelector("#m-input");
  $i.placeholder = opts.placeholder || "";
  var $c = backdrop.querySelector("#m-confirm");
  $c.textContent = opts.confirmText || "OK";

  setTimeout(function(){ $i.focus(); }, 0);

  function close(){ backdrop.remove(); document.removeEventListener("keydown", onKey); }
  function commit(){
    var v = $i.value;
    close();
    if(opts.onConfirm) opts.onConfirm(v);
  }
  function onKey(e){
    if(e.key === "Escape") close();
    if(e.key === "Enter") commit();
  }
  document.addEventListener("keydown", onKey);

  backdrop.addEventListener("click", function(e){ if(e.target === backdrop) close(); });
  backdrop.querySelector("#m-cancel").addEventListener("click", close);
  $c.addEventListener("click", commit);
}

  /* ---------- storage ---------- */
  function loadCal(){
    var data = null;
    try{
      var raw = localStorage.getItem(CAL_KEY);
      if(raw){
        var p = JSON.parse(raw);
        if(p && Array.isArray(p.events)) data = p;
      }
    }catch(_){}
    if(!data) data = { version:1, events:[], seedVersion:0 };
    if(typeof data.seedVersion !== "number") data.seedVersion = 0;

    // Merge seed events whose deterministic IDs don't already exist locally
    if(data.seedVersion < SEED_VERSION){
      var have = {};
      data.events.forEach(function(e){ have[e.id] = 1; });
      SEED_EVENTS.forEach(function(e){
        if(!have[e.id]) data.events.push(JSON.parse(JSON.stringify(e)));
      });
      data.seedVersion = SEED_VERSION;
      try{ localStorage.setItem(CAL_KEY, JSON.stringify(data)); }catch(_){}
    }
    return data;
  }
  function saveCal(){
    try{ localStorage.setItem(CAL_KEY, JSON.stringify(calState)); }catch(_){}
  }

  /* ---------- state ---------- */
  var calState = loadCal();
  var view = "week";          // 'day' | 'week' | 'month'
  var cursor = new Date();    // anchor date for current view

  /* ---------- person filter ---------- */
  var FILTER_KEY = "brown_calendar_filter_v1";
  var selectedPersons; // Set<string>; null until loaded
  function loadFilter(){
    try{
      var raw = localStorage.getItem(FILTER_KEY);
      if(raw){
        var arr = JSON.parse(raw);
        if(Array.isArray(arr)) return new Set(arr);
      }
    }catch(_){}
    return new Set(KNOWN_PERSONS); // default: all six selected
  }
  function saveFilter(){
    try{
      var arr = []; selectedPersons.forEach(function(p){ arr.push(p); });
      localStorage.setItem(FILTER_KEY, JSON.stringify(arr));
    }catch(_){}
  }
  selectedPersons = loadFilter();

  function eventVisible(e){
    if(!e.person) return true;     // events without a person are always shown
    return selectedPersons.has(e.person);
  }

  /* ---------- DOM refs ---------- */
  var $overlay = document.getElementById("cal-overlay");
  var $body    = document.getElementById("cal-body");
  var $side    = document.getElementById("cal-side");
  var $period  = document.getElementById("cal-period");
  var $views   = $overlay.querySelectorAll(".cal-views button");

  /* ---------- open / close ---------- */
  function open(){
    cursor = new Date();
    $overlay.classList.add("show");
    $overlay.setAttribute("aria-hidden","false");
    document.body.style.overflow = "hidden";
    render();
  }
  function close(){
    $overlay.classList.remove("show");
    $overlay.setAttribute("aria-hidden","true");
    document.body.style.overflow = "";
  }

  /* ---------- view nav ---------- */
  function setView(v){
    view = v;
    $views.forEach(function(b){ b.classList.toggle("active", b.dataset.view === v); });
    render();
  }
  function shift(direction){
    if(view === "day")   cursor = addDays(cursor, direction);
    if(view === "week")  cursor = addDays(cursor, 7*direction);
    if(view === "month") cursor = new Date(cursor.getFullYear(), cursor.getMonth()+direction, 1);
    render();
  }
  function goToday(){ cursor = new Date(); render(); }

  /* ---------- event helpers ---------- */
  function eventsForDate(dateStr){
    return calState.events
      .filter(function(e){ return e.date === dateStr && eventVisible(e); })
      .sort(function(a,b){
        var ta = a.time || "99:99";
        var tb = b.time || "99:99";
        return ta.localeCompare(tb);
      });
  }
  function fmtTimeRange(ev){
    if(!ev.time) return "Tutto il giorno";
    if(ev.endTime && ev.endTime !== ev.time) return ev.time + " – " + ev.endTime;
    return ev.time;
  }

  /* ---------- rendering ---------- */
  function getAllPersons(){
    // Known team first (in stable order), then any extra persons found in events
    var seen = {};
    var ordered = [];
    KNOWN_PERSONS.forEach(function(p){ seen[p]=1; ordered.push(p); });
    var extras = [];
    calState.events.forEach(function(e){
      if(e.person && !seen[e.person]){ seen[e.person]=1; extras.push(e.person); }
    });
    extras.sort(function(a,b){ return a.localeCompare(b); });
    return ordered.concat(extras);
  }

  function renderPersonSide(){
    var people = getAllPersons();
    $side.innerHTML = "";

    var h = document.createElement("h3");
    h.textContent = "Persone";
    $side.appendChild(h);

    // "Tutti" master toggle
    var allRow = document.createElement("div");
    allRow.className = "cal-person-row all";
    var allOn = people.length > 0 && people.every(function(p){ return selectedPersons.has(p); });
    if(allOn) allRow.classList.add("checked");
    allRow.innerHTML = '<div class="cal-cb"></div><div class="cal-person-name">Tutti</div>'+
                       '<div class="cal-person-count">'+ people.length +'</div>';
    allRow.addEventListener("click", function(){
      if(allOn){ selectedPersons.clear(); }
      else { people.forEach(function(p){ selectedPersons.add(p); }); }
      saveFilter();
      render();
    });
    $side.appendChild(allRow);

    var divider = document.createElement("div");
    divider.className = "cal-side-divider";
    $side.appendChild(divider);

    // Per-person rows
    people.forEach(function(p){
      var row = document.createElement("div");
      row.className = "cal-person-row";
      if(selectedPersons.has(p)) row.classList.add("checked");
      row.style.setProperty("--pc", personColor(p));
      var count = calState.events.reduce(function(n,e){ return n + (e.person === p ? 1 : 0); }, 0);
      row.innerHTML =
        '<div class="cal-cb"></div>'+
        '<div class="cal-person-name">'+ escapeHtml(p) +'</div>'+
        '<div class="cal-person-count">'+ count +'</div>';
      row.addEventListener("click", function(e){
        if(e.shiftKey || e.metaKey || e.ctrlKey){
          // modifier-click: solo questa persona
          selectedPersons.clear();
          selectedPersons.add(p);
        } else {
          if(selectedPersons.has(p)) selectedPersons.delete(p);
          else selectedPersons.add(p);
        }
        saveFilter();
        render();
      });
      $side.appendChild(row);
    });

    // Quick-action buttons
    var actions = document.createElement("div");
    actions.className = "cal-side-actions";
    actions.innerHTML =
      '<button data-act="all">Tutti</button>'+
      '<button data-act="none">Nessuno</button>';
    actions.querySelector('[data-act="all"]').addEventListener("click", function(){
      people.forEach(function(p){ selectedPersons.add(p); });
      saveFilter(); render();
    });
    actions.querySelector('[data-act="none"]').addEventListener("click", function(){
      selectedPersons.clear();
      saveFilter(); render();
    });
    $side.appendChild(actions);
  }

  function render(){
    renderPersonSide();
    if(view === "day")   renderDay();
    if(view === "week")  renderWeek();
    if(view === "month") renderMonth();
  }

  function renderMonth(){
    $period.textContent = MONTHS[cursor.getMonth()] + " " + cursor.getFullYear();
    $body.innerHTML = "";

    var wrap = document.createElement("div");
    wrap.className = "cal-month";

    var head = document.createElement("div");
    head.className = "cal-month-headrow";
    DAYS_SHORT.forEach(function(d){
      var h = document.createElement("div");
      h.textContent = d;
      head.appendChild(h);
    });
    wrap.appendChild(head);

    var grid = document.createElement("div");
    grid.className = "cal-month-grid";

    var firstOfMonth = startOfMonth(cursor);
    var gridStart = startOfWeek(firstOfMonth);
    var today = new Date();

    // 6 rows × 7 cols = 42 cells
    for(var i=0;i<42;i++){
      var d = addDays(gridStart, i);
      var cell = document.createElement("div");
      cell.className = "cal-day-cell";
      if(d.getMonth() !== cursor.getMonth()) cell.classList.add("other-month");
      if(isSameDay(d, today)) cell.classList.add("today");

      var num = document.createElement("span");
      num.className = "cal-day-num";
      num.textContent = d.getDate();
      cell.appendChild(num);

      var evs = eventsForDate(fmtDate(d));
      var evWrap = document.createElement("div");
      evWrap.className = "cal-day-events";
      var max = 3;
      evs.slice(0, max).forEach(function(e){
        var chip = document.createElement("div");
        chip.className = "cal-event";
        chip.style.borderLeftColor = personColor(e.person);
        chip.textContent = (e.time ? e.time + " " : "") + e.title;
        chip.addEventListener("click", function(ev){ ev.stopPropagation(); openEventModal(e); });
        evWrap.appendChild(chip);
      });
      if(evs.length > max){
        var more = document.createElement("div");
        more.className = "cal-event-more";
        more.textContent = "+ " + (evs.length - max) + " altri";
        evWrap.appendChild(more);
      }
      cell.appendChild(evWrap);

      (function(date){
        cell.addEventListener("click", function(){
          // single click on day cell → switch to day view
          cursor = date;
          setView("day");
        });
      })(new Date(d));

      grid.appendChild(cell);
    }
    wrap.appendChild(grid);
    $body.appendChild(wrap);
  }

  function renderWeek(){
    var ws = startOfWeek(cursor);
    var we = addDays(ws, 6);
    var sameMonth = ws.getMonth() === we.getMonth();
    if(sameMonth){
      $period.textContent = ws.getDate() + " – " + we.getDate() + " " + MONTHS[ws.getMonth()] + " " + ws.getFullYear();
    } else {
      $period.textContent = ws.getDate() + " " + MONTHS[ws.getMonth()] + " – " + we.getDate() + " " + MONTHS[we.getMonth()] + " " + we.getFullYear();
    }
    $body.innerHTML = "";

    var wrap = document.createElement("div");
    wrap.className = "cal-week";

    var today = new Date();
    for(var i=0;i<7;i++){
      var d = addDays(ws, i);
      var col = document.createElement("div");
      col.className = "cal-week-col";

      var head = document.createElement("div");
      head.className = "cal-week-head";
      if(isSameDay(d, today)) head.classList.add("today");
      head.innerHTML = '<div class="cal-week-day-name">'+ DAYS_SHORT[i] +'</div>'+
                       '<div class="cal-week-day-num">'+ d.getDate() +'</div>';
      (function(date){
        head.addEventListener("click", function(){
          cursor = date;
          setView("day");
        });
      })(new Date(d));
      col.appendChild(head);

      var list = document.createElement("div");
      list.className = "cal-week-events";
      var evs = eventsForDate(fmtDate(d));
      if(!evs.length){
        var ph = document.createElement("button");
        ph.className = "add-card";
        ph.style.margin = "0";
        ph.style.fontSize = "12px";
        ph.style.padding = "6px 8px";
        ph.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg> Aggiungi';
        (function(date){
          ph.addEventListener("click", function(ev){ ev.stopPropagation(); openEventModal(null, fmtDate(date)); });
        })(new Date(d));
        list.appendChild(ph);
      }
      evs.forEach(function(e){
        var item = document.createElement("div");
        item.className = "cal-week-event";
        item.style.borderLeftColor = personColor(e.person);
        var html = "";
        html += '<div class="cal-week-event-time">'+ escapeHtml(fmtTimeRange(e)) +'</div>';
        html += '<div class="cal-week-event-title">'+ escapeHtml(e.title) +'</div>';
        if(e.person){
          html += '<div class="cal-week-event-person"><span class="cal-person-dot" style="background:'+ personColor(e.person) +'"></span>'+ escapeHtml(e.person) +'</div>';
        }
        item.innerHTML = html;
        item.addEventListener("click", function(){ openEventModal(e); });
        list.appendChild(item);
      });
      col.appendChild(list);

      wrap.appendChild(col);
    }
    $body.appendChild(wrap);
  }

  function renderDay(){
    $period.textContent = cursor.getDate() + " " + MONTHS[cursor.getMonth()] + " " + cursor.getFullYear();
    $body.innerHTML = "";

    var wrap = document.createElement("div");
    wrap.className = "cal-day-view";

    var head = document.createElement("div");
    head.className = "cal-day-view-head";
    var today = new Date();
    if(isSameDay(cursor, today)) head.classList.add("today");
    head.innerHTML = '<h3>'+ DAYS_LONG[(cursor.getDay()+6)%7] +' <span class="daynum">'+ cursor.getDate() +'</span> '+ MONTHS[cursor.getMonth()] +'</h3>';
    wrap.appendChild(head);

    var list = document.createElement("div");
    list.className = "cal-day-list";

    var evs = eventsForDate(fmtDate(cursor));
    if(!evs.length){
      var empty = document.createElement("div");
      empty.className = "cal-empty";
      empty.innerHTML = '<h3>Nessun impegno</h3><p>Non ci sono impegni per questa giornata.</p>';
      var btn = document.createElement("button");
      btn.className = "cal-add-btn";
      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg> Aggiungi impegno';
      btn.addEventListener("click", function(){ openEventModal(null, fmtDate(cursor)); });
      empty.appendChild(btn);
      list.appendChild(empty);
    } else {
      evs.forEach(function(e){
        var card = document.createElement("div");
        card.className = "cal-day-event-card";
        card.style.borderLeftColor = personColor(e.person);

        var t = document.createElement("div");
        t.className = "cal-day-event-time" + (e.time ? "" : " notime");
        t.textContent = fmtTimeRange(e);

        var body = document.createElement("div");
        body.className = "cal-day-event-body";
        var title = document.createElement("div");
        title.className = "cal-day-event-title";
        title.textContent = e.title;
        body.appendChild(title);
        if(e.person){
          var meta = document.createElement("div");
          meta.className = "cal-day-event-meta";
          meta.innerHTML = '<span class="cal-person-dot" style="background:'+ personColor(e.person) +'"></span>'+ escapeHtml(e.person);
          body.appendChild(meta);
        }
        if(e.notes){
          var n = document.createElement("div");
          n.className = "cal-day-event-notes";
          n.textContent = e.notes;
          body.appendChild(n);
        }

        card.appendChild(t);
        card.appendChild(body);
        card.addEventListener("click", function(){ openEventModal(e); });
        list.appendChild(card);
      });
    }
    wrap.appendChild(list);
    $body.appendChild(wrap);
  }

  function escapeHtml(s){
    return String(s||"").replace(/[&<>"']/g, function(c){
      return ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c];
    });
  }

  /* ---------- event modal ---------- */
  function openEventModal(existing, defaultDate){
    var isEdit = !!existing;
    var data = existing ? Object.assign({}, existing) : {
      id: null,
      date: defaultDate || fmtDate(cursor),
      time: "",
      endTime: "",
      title: "",
      person: "",
      notes: ""
    };

    var bd = document.createElement("div");
    bd.className = "modal-backdrop";
    bd.innerHTML =
      '<div class="modal" role="dialog" style="max-width:480px">' +
        '<h2>'+ (isEdit ? "Modifica impegno" : "Nuovo impegno") +'</h2>' +

        '<label>Titolo</label>' +
        '<input type="text" id="cm-title" placeholder="Cosa va fatto" maxlength="200">' +

        '<label>Persona</label>' +
        '<input type="text" id="cm-person" placeholder="Chi se ne occupa" list="cm-persons" maxlength="80">' +
        '<datalist id="cm-persons"></datalist>' +

        '<div style="display:flex;gap:10px">' +
          '<div style="flex:1">' +
            '<label>Data</label>' +
            '<input type="date" id="cm-date">' +
          '</div>' +
          '<div style="flex:0 0 110px">' +
            '<label>Inizio</label>' +
            '<input type="time" id="cm-time">' +
          '</div>' +
          '<div style="flex:0 0 110px">' +
            '<label>Fine</label>' +
            '<input type="time" id="cm-end">' +
          '</div>' +
        '</div>' +

        '<label>Note (opzionale)</label>' +
        '<textarea id="cm-notes" placeholder="Dettagli aggiuntivi" style="min-height:60px"></textarea>' +

        '<div class="actions" style="justify-content:space-between">' +
          '<div>' +
            (isEdit ? '<button class="btn-cancel" id="cm-delete" style="color:#f87168">Elimina</button>' : '') +
          '</div>' +
          '<div style="display:flex;gap:8px">' +
            '<button class="btn-cancel" id="cm-cancel">Annulla</button>' +
            '<button class="btn-primary" id="cm-save">Salva</button>' +
          '</div>' +
        '</div>' +
      '</div>';
    document.body.appendChild(bd);

    var $title = bd.querySelector("#cm-title");
    var $person= bd.querySelector("#cm-person");
    var $date  = bd.querySelector("#cm-date");
    var $time  = bd.querySelector("#cm-time");
    var $end   = bd.querySelector("#cm-end");
    var $notes = bd.querySelector("#cm-notes");
    var $list  = bd.querySelector("#cm-persons");

    // populate person suggestions: known team members first, then anything else seen
    var seen = {};
    KNOWN_PERSONS.forEach(function(p){ seen[p] = 1; });
    calState.events.forEach(function(e){ if(e.person) seen[e.person] = 1; });
    Object.keys(seen).sort(function(a,b){
      var ai = KNOWN_PERSONS.indexOf(a), bi = KNOWN_PERSONS.indexOf(b);
      if(ai !== -1 || bi !== -1){
        if(ai === -1) return 1;
        if(bi === -1) return -1;
        return ai - bi;
      }
      return a.localeCompare(b);
    }).forEach(function(name){
      var o = document.createElement("option");
      o.value = name;
      $list.appendChild(o);
    });

    $title.value  = data.title;
    $person.value = data.person || "";
    $date.value   = data.date;
    $time.value   = data.time || "";
    $end.value    = data.endTime || "";
    $notes.value  = data.notes || "";
    setTimeout(function(){ $title.focus(); $title.select(); }, 0);

    function teardown(){ bd.remove(); document.removeEventListener("keydown", onKey); }
    function save(){
      var v = $title.value.trim();
      if(!v){ $title.focus(); return; }
      data.title  = v;
      data.person = $person.value.trim();
      data.date   = $date.value || fmtDate(new Date());
      data.time   = $time.value || "";
      data.endTime= $end.value  || "";
      data.notes  = $notes.value.trim();

      if(isEdit){
        var idx = calState.events.findIndex(function(x){ return x.id === data.id; });
        if(idx >= 0) calState.events[idx] = data;
      } else {
        data.id = "e_" + Math.random().toString(36).slice(2,9) + Date.now().toString(36).slice(-3);
        calState.events.push(data);
      }
      saveCal();
      teardown();
      render();
    }
    function del(){
      if(!confirm("Eliminare questo impegno?")) return;
      calState.events = calState.events.filter(function(x){ return x.id !== data.id; });
      saveCal();
      teardown();
      render();
    }
    function onKey(e){
      if(e.key === "Escape") teardown();
      if(e.key === "Enter" && (e.metaKey || e.ctrlKey)) save();
    }
    document.addEventListener("keydown", onKey);

    bd.addEventListener("click", function(e){ if(e.target === bd) teardown(); });
    bd.querySelector("#cm-cancel").addEventListener("click", teardown);
    bd.querySelector("#cm-save").addEventListener("click", save);
    var $del = bd.querySelector("#cm-delete");
    if($del) $del.addEventListener("click", del);
  }

  /* ---------- wire up ---------- */
  document.getElementById("open-calendar-btn").addEventListener("click", open);
  document.getElementById("cal-close").addEventListener("click", close);
  document.getElementById("cal-prev").addEventListener("click", function(){ shift(-1); });
  document.getElementById("cal-next").addEventListener("click", function(){ shift(1); });
  document.getElementById("cal-today-btn").addEventListener("click", goToday);
  document.getElementById("cal-add-btn").addEventListener("click", function(){ openEventModal(null, fmtDate(cursor)); });
  $views.forEach(function(b){
    b.addEventListener("click", function(){ setView(b.dataset.view); });
  });
  document.addEventListener("keydown", function(e){
    if(!$overlay.classList.contains("show")) return;
    if(e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
    if(e.key === "Escape") close();
    if(e.key === "ArrowLeft") shift(-1);
    if(e.key === "ArrowRight") shift(1);
    if(e.key === "t" || e.key === "T") goToday();
    if(e.key === "1") setView("day");
    if(e.key === "2") setView("week");
    if(e.key === "3") setView("month");
  });

  // initial active view
  $views.forEach(function(b){ b.classList.toggle("active", b.dataset.view === view); });
})();
</script>
</body>
</html>
